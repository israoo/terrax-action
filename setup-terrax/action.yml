name: 'Setup TerraX'
description: 'Install the TerraX binary from GitHub Releases and add it to PATH. Supports Linux only.'
inputs:
  version:
    description: 'TerraX version to install (e.g. v0.5.1 or latest).'
    required: false
    default: 'latest'
outputs:
  terrax-version:
    description: 'Resolved version that was installed (e.g. v0.5.0).'
    value: ${{ steps.install.outputs.terrax-version }}
runs:
  using: 'composite'
  steps:
    - name: Install TerraX
      id: install
      shell: bash
      env:
        GH_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        VERSION="$GH_VERSION"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/israoo/terrax/releases/latest" \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": "\([^"]*\)".*/\1/')
        fi

        # GoReleaser strips the leading 'v' from .Version in archive names.
        VERSION_CLEAN="${VERSION#v}"

        case "$RUNNER_ARCH" in
          X64)   ARCH="x86_64" ;;
          ARM64) ARCH="arm64"  ;;
          *) echo "Unsupported arch: $RUNNER_ARCH" && exit 1 ;;
        esac

        ARCHIVE="terrax_${VERSION_CLEAN}_Linux_${ARCH}.tar.gz"
        URL="https://github.com/israoo/terrax/releases/download/${VERSION}/${ARCHIVE}"
        INSTALL_DIR="$(mktemp -d)"

        echo "Downloading ${URL}"
        curl -fsSL "$URL" -o "${INSTALL_DIR}/${ARCHIVE}"
        tar -xzf "${INSTALL_DIR}/${ARCHIVE}" -C "$INSTALL_DIR"
        chmod +x "${INSTALL_DIR}/terrax"
        echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
        echo "terrax-version=${VERSION}" >> "$GITHUB_OUTPUT"
