name: Test Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [terrax-released]

jobs:
  test-setup-terrax:
    name: Test setup-terrax
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install TerraX (latest)
        id: setup
        uses: ./setup-terrax

      - name: Verify binary is in PATH and runs
        run: |
          which terrax
          terrax --version

      - name: Verify terrax-version output format
        run: |
          VERSION="${{ steps.setup.outputs.terrax-version }}"
          echo "terrax-version output: $VERSION"
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || (echo "FAIL: unexpected format — got '$VERSION'" && exit 1)
          echo "OK: format matches ^v[0-9]+\.[0-9]+\.[0-9]+$"

      - name: Install TerraX (pinned v0.5.0)
        id: pinned
        uses: ./setup-terrax
        with:
          version: v0.5.0

      - name: Verify pinned version matches request
        run: |
          GOT="${{ steps.pinned.outputs.terrax-version }}"
          echo "Requested: v0.5.0 — got: $GOT"
          [ "$GOT" = "v0.5.0" ] || (echo "FAIL: expected v0.5.0, got $GOT" && exit 1)
          echo "OK"

  test-find-stacks:
    name: Test find-stacks
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./setup-terrax

      - name: Find all stacks under fixtures
        id: all
        uses: ./find-stacks
        with:
          dir: tests/fixtures

      - name: Verify count=3 and all expected paths are present
        run: |
          COUNT="${{ steps.all.outputs.count }}"
          STACKS='${{ steps.all.outputs.stacks }}'
          echo "count:  $COUNT"
          echo "stacks: $STACKS"
          [ "$COUNT" = "3" ] || (echo "FAIL: expected count=3, got $COUNT" && exit 1)
          for SUFFIX in "tests/fixtures/prod/vpc" "tests/fixtures/prod/eks" "tests/fixtures/staging/vpc"; do
            echo "$STACKS" | jq -e --arg s "$SUFFIX" '[.[] | endswith($s)] | any' \
              || (echo "FAIL: missing expected suffix $SUFFIX" && exit 1)
            echo "OK: found $SUFFIX"
          done

      - name: Find stacks in empty dir returns empty array
        id: empty
        uses: ./find-stacks
        with:
          dir: /tmp

      - name: Verify empty result
        run: |
          COUNT="${{ steps.empty.outputs.count }}"
          STACKS='${{ steps.empty.outputs.stacks }}'
          echo "count:  $COUNT"
          echo "stacks: $STACKS"
          [ "$COUNT" = "0" ] || (echo "FAIL: expected count=0, got $COUNT" && exit 1)
          echo '${{ steps.empty.outputs.stacks }}' | jq -e '. == []' \
            || (echo "FAIL: stacks is not empty array" && exit 1)
          echo "OK"

      - name: Set up synthetic git repo for --base tests
        run: |
          REPO=$(mktemp -d)
          git init -b main "$REPO"
          git -C "$REPO" config user.email "ci@test"
          git -C "$REPO" config user.name "CI"
          touch "$REPO/root.hcl"
          mkdir -p "$REPO/stacks/vpc" "$REPO/stacks/eks"
          echo "# vpc" > "$REPO/stacks/vpc/terragrunt.hcl"
          echo "# eks" > "$REPO/stacks/eks/terragrunt.hcl"
          git -C "$REPO" add -A && git -C "$REPO" commit -m "init"
          BASE=$(git -C "$REPO" rev-parse HEAD)
          echo "BASE_COMMIT=$BASE" >> "$GITHUB_ENV"
          echo "# changed" >> "$REPO/stacks/vpc/terragrunt.hcl"
          git -C "$REPO" add -A && git -C "$REPO" commit -m "change vpc"
          HEAD=$(git -C "$REPO" rev-parse HEAD)
          echo "HEAD_COMMIT=$HEAD" >> "$GITHUB_ENV"
          echo "TEST_REPO=$REPO" >> "$GITHUB_ENV"
          echo "Repo: $REPO  base: $BASE  head: $HEAD"

      - name: find-stacks --base returns only affected stack
        id: affected
        uses: ./find-stacks
        with:
          dir: ${{ env.TEST_REPO }}
          base: ${{ env.BASE_COMMIT }}

      - name: Verify only vpc is returned
        run: |
          COUNT="${{ steps.affected.outputs.count }}"
          STACKS='${{ steps.affected.outputs.stacks }}'
          echo "count:  $COUNT"
          echo "stacks: $STACKS"
          [ "$COUNT" = "1" ] || (echo "FAIL: expected count=1, got $COUNT" && exit 1)
          echo "$STACKS" | jq -e '[.[] | endswith("stacks/vpc")] | any' \
            || (echo "FAIL: stacks/vpc not in output" && exit 1)
          echo "OK: only vpc returned as affected"

      - name: find-stacks --base=HEAD returns empty (no changes)
        id: no-changes
        uses: ./find-stacks
        with:
          dir: ${{ env.TEST_REPO }}
          base: ${{ env.HEAD_COMMIT }}

      - name: Verify empty result when base equals HEAD
        run: |
          COUNT="${{ steps.no-changes.outputs.count }}"
          STACKS='${{ steps.no-changes.outputs.stacks }}'
          echo "count:  $COUNT"
          echo "stacks: $STACKS"
          [ "$COUNT" = "0" ] || (echo "FAIL: expected count=0 when base=HEAD, got $COUNT" && exit 1)
          echo "$STACKS" | jq -e '. == []' || (echo "FAIL: stacks is not empty array" && exit 1)
          echo "OK"

  test-classify-stacks:
    name: Test classify-stacks
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./setup-terrax

      - name: Create fixture repo with two stacks (default + private_connection)
        run: |
          REPO=$(mktemp -d)
          echo "" > "$REPO/root.hcl"
          printf 'stack_groups:\n  default:\n    depends_on: []\n  private_connection:\n    detect: "require_private_connection = true"\n    depends_on: [default]\n' \
            > "$REPO/.terrax.yaml"
          mkdir -p "$REPO/workloads/default/vpc"
          echo "# vpc" > "$REPO/workloads/default/vpc/terragrunt.hcl"
          mkdir -p "$REPO/workloads/private/db"
          echo "# db" > "$REPO/workloads/private/db/terragrunt.hcl"
          echo "require_private_connection = true" > "$REPO/workloads/private/db/stack.hcl"
          echo "TEST_REPO=$REPO" >> "$GITHUB_ENV"
          echo "Fixture: $REPO"
          echo "  workloads/default/vpc  → default group"
          echo "  workloads/private/db   → private_connection group"

      - name: Classify all stacks (no --stacks input)
        id: all
        uses: ./classify-stacks
        with:
          dir: ${{ env.TEST_REPO }}

      - name: Verify both groups are present
        run: |
          FILE="${{ steps.all.outputs.groups-file }}"
          echo "groups-file: $FILE"
          echo "--- content ---"
          cat "$FILE"
          echo "--- end ---"
          jq -e '.groups | map(.name) | contains(["default","private_connection"])' "$FILE" \
            || (echo "FAIL: expected both groups default and private_connection" && exit 1)
          echo "OK: both groups present"

      - name: Classify only vpc stack via --stacks
        id: vpc-only
        uses: ./classify-stacks
        with:
          dir: ${{ env.TEST_REPO }}
          stacks: '["${{ env.TEST_REPO }}/workloads/default/vpc"]'

      - name: Verify vpc lands in default group only
        run: |
          FILE="${{ steps.vpc-only.outputs.groups-file }}"
          echo "groups-file: $FILE"
          echo "--- content ---"
          cat "$FILE"
          echo "--- end ---"
          jq -e '.groups | map(select(.name == "default")) | .[0].filters | any(endswith("workloads/default/vpc"))' \
            "$FILE" || (echo "FAIL: vpc not found in default group" && exit 1)
          echo "OK: vpc in default group"
          jq -e '.groups | map(select(.name == "private_connection")) | .[0].filters | length == 0' \
            "$FILE" || (echo "FAIL: private_connection should be empty" && exit 1)
          echo "OK: private_connection group is empty"

      - name: Classify only db stack via --stacks
        id: db-only
        uses: ./classify-stacks
        with:
          dir: ${{ env.TEST_REPO }}
          stacks: '["${{ env.TEST_REPO }}/workloads/private/db"]'

      - name: Verify db lands in private_connection group
        run: |
          FILE="${{ steps.db-only.outputs.groups-file }}"
          echo "groups-file: $FILE"
          echo "--- content ---"
          cat "$FILE"
          echo "--- end ---"
          jq -e '.groups | map(select(.name == "private_connection")) | .[0].filters | any(endswith("workloads/private/db"))' \
            "$FILE" || (echo "FAIL: db not found in private_connection group" && exit 1)
          echo "OK: db in private_connection group"

  test-summary:
    name: Test summary
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./setup-terrax

      - name: Create repo root marker and empty plans dir
        run: |
          echo "# root" > root.hcl
          mkdir -p .terrax/plans
          echo "Created root.hcl and empty .terrax/plans/"

      - name: Run summary with empty plans dir (expect exit 0)
        uses: ./summary
        # terrax summary exits 0 with a "no plans" message when .terrax/plans/ is empty.

      - name: Create fixture plan files
        run: |
          mkdir -p /tmp/fixture-plans/prod/vpc /tmp/fixture-plans/prod/eks
          echo '{"resource_changes":[{"address":"aws_vpc.main","type":"aws_vpc","name":"main","change":{"actions":["create"],"before":null,"after":{"cidr_block":"10.0.0.0/16"}}}]}' \
            > /tmp/fixture-plans/prod/vpc/tfplan.json
          echo '{"resource_changes":[{"address":"aws_instance.web","type":"aws_instance","name":"web","change":{"actions":["no-op"],"before":{},"after":{}}}]}' \
            > /tmp/fixture-plans/prod/eks/tfplan.json
          echo "Created fixture plans:"
          echo "  prod/vpc — create (has changes)"
          echo "  prod/eks — no-op (no changes)"

      - name: Run summary with plans-dir
        uses: ./summary
        with:
          plans-dir: /tmp/fixture-plans

      - name: Verify summary output contains both stacks
        run: |
          echo "Running terrax summary --plans-dir /tmp/fixture-plans"
          OUTPUT=$(terrax summary --plans-dir /tmp/fixture-plans 2>&1)
          echo "--- output ---"
          echo "$OUTPUT"
          echo "--- end ---"
          echo "$OUTPUT" | grep -q "prod/vpc" || (echo "FAIL: prod/vpc missing from summary" && exit 1)
          echo "OK: prod/vpc present"
          echo "$OUTPUT" | grep -q "prod/eks" || (echo "FAIL: prod/eks missing from summary" && exit 1)
          echo "OK: prod/eks present"

      - name: Create custom dir for --dir test
        run: |
          mkdir -p /tmp/summary-dir
          echo "# root" > /tmp/summary-dir/root.hcl
          mkdir -p /tmp/summary-dir/.terrax/plans
          echo "Created /tmp/summary-dir with empty plans"

      - name: Run summary with explicit dir (expect exit 0 with empty plans)
        uses: ./summary
        with:
          dir: /tmp/summary-dir

  test-plan-report:
    name: Test plan-report
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./setup-terrax

      - name: Create fixture plan files with changes
        run: |
          mkdir -p /tmp/report-plans/prod/vpc /tmp/report-plans/prod/eks
          echo '{"resource_changes":[{"address":"aws_vpc.main","type":"aws_vpc","name":"main","change":{"actions":["create"],"before":null,"after":{"cidr_block":"10.0.0.0/16"}}}]}' \
            > /tmp/report-plans/prod/vpc/tfplan.json
          echo '{"resource_changes":[{"address":"aws_instance.web","type":"aws_instance","name":"web","change":{"actions":["update"],"before":{"instance_type":"t3.micro"},"after":{"instance_type":"t3.small"}}}]}' \
            > /tmp/report-plans/prod/eks/tfplan.json
          echo "Created fixture plans:"
          echo "  prod/vpc — create aws_vpc.main"
          echo "  prod/eks — update aws_instance.web (t3.micro → t3.small)"

      - name: Generate plan report (default output path)
        id: report
        uses: ./plan-report
        with:
          plans-dir: /tmp/report-plans

      - name: Verify has-changes=true and report file is valid
        run: |
          HAS="${{ steps.report.outputs.has-changes }}"
          FILE="${{ steps.report.outputs.report-file }}"
          echo "has-changes:  $HAS"
          echo "report-file:  $FILE"
          [ "$HAS" = "true" ] || (echo "FAIL: expected has-changes=true, got $HAS" && exit 1)
          echo "OK: has-changes=true"
          [ -n "$FILE" ] || (echo "FAIL: report-file output is empty" && exit 1)
          [ -f "$FILE" ] || (echo "FAIL: file does not exist: $FILE" && exit 1)
          [ -s "$FILE" ] || (echo "FAIL: file is empty: $FILE" && exit 1)
          echo "OK: file exists and is non-empty"
          grep -q "prod/vpc" "$FILE" || (echo "FAIL: prod/vpc missing from report" && exit 1)
          echo "OK: prod/vpc present"
          grep -q "prod/eks" "$FILE" || (echo "FAIL: prod/eks missing from report" && exit 1)
          echo "OK: prod/eks present"
          echo "--- report preview (first 20 lines) ---"
          head -20 "$FILE"
          echo "---"

      - name: Generate plan report with custom output path
        id: report-custom
        uses: ./plan-report
        with:
          plans-dir: /tmp/report-plans
          output: /tmp/my-custom-report.md

      - name: Verify custom output path is used
        run: |
          GOT="${{ steps.report-custom.outputs.report-file }}"
          echo "report-file: $GOT"
          [ "$GOT" = "/tmp/my-custom-report.md" ] \
            || (echo "FAIL: expected /tmp/my-custom-report.md, got $GOT" && exit 1)
          [ -f "/tmp/my-custom-report.md" ] || (echo "FAIL: custom file not found" && exit 1)
          echo "OK"

      - name: Generate plan report with empty plans dir
        id: report-empty
        uses: ./plan-report
        with:
          plans-dir: /tmp/empty-plans

      - name: Verify has-changes=false and no report file when plans dir is empty
        run: |
          HAS="${{ steps.report-empty.outputs.has-changes }}"
          FILE="${{ steps.report-empty.outputs.report-file }}"
          echo "has-changes: $HAS"
          echo "report-file: '$FILE'"
          [ "$HAS" = "false" ] || (echo "FAIL: expected has-changes=false, got $HAS" && exit 1)
          echo "OK: has-changes=false"
          [ -z "$FILE" ] || (echo "FAIL: expected report-file to be empty, got $FILE" && exit 1)
          echo "OK: report-file is empty"
