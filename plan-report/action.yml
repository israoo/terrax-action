name: 'TerraX Plan Report'
description: 'Generate a markdown report from JSON plan files with per-resource attribute diffs. No binary plan or .terragrunt-cache required.'
inputs:
  plans-dir:
    description: 'Directory containing JSON plan files (from terragrunt --json-out-dir).'
    required: true
  output:
    description: 'Output file path. Defaults to a temp file under RUNNER_TEMP.'
    required: false
    default: ''
outputs:
  report-file:
    description: 'Path to the generated markdown report file. Empty when no stacks have pending changes.'
    value: ${{ steps.report.outputs.report-file }}
  has-changes:
    description: 'true when at least one stack has pending changes, false otherwise.'
    value: ${{ steps.report.outputs.has-changes }}
runs:
  using: 'composite'
  steps:
    - name: Generate report
      id: report
      shell: bash
      env:
        INPUT_PLANS_DIR: ${{ inputs.plans-dir }}
        INPUT_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail

        REPORT_FILE="${INPUT_OUTPUT:-${RUNNER_TEMP}/terrax-plan-report.md}"

        set +e
        terrax report \
          --plans-dir "$INPUT_PLANS_DIR" \
          --format markdown \
          --output "$REPORT_FILE" \
          --exit-code
        TERRAX_EXIT=$?
        set -e

        # Exit 2 = changes present (mirrors terraform -detailed-exitcode).
        # Exit 0 = no plan files or no changes.
        # Any other code is a real error.
        case "$TERRAX_EXIT" in
          0)
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            ;;
          2)
            echo "report-file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            ;;
          *)
            exit "$TERRAX_EXIT"
            ;;
        esac
